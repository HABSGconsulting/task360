name: Step 1 — Build Base DB

on:
  workflow_dispatch:

jobs:
  build-base-db:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run 01_build_base_db.py
        run: python scripts/01_build_base_db.py

      - name: Commit base_db.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/base_db.csv
          git diff --cached --quiet || git commit -m "chore: generate data/base_db.csv from Step 1 [skip ci]"
          git push
